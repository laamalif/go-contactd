services:
  contactd:
    image: go-contactd:dev
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CONTACTD_HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      CONTACTD_DB_PATH: /data/contactd.sqlite
      CONTACTD_LOG_LEVEL: "${CONTACTD_LOG_LEVEL:-info}"
      CONTACTD_LOG_FORMAT: "${CONTACTD_LOG_FORMAT:-text}"
      CONTACTD_TRUST_PROXY_HEADERS: "${CONTACTD_TRUST_PROXY_HEADERS:-false}"
      CONTACTD_REQUEST_MAX_BYTES: "${CONTACTD_REQUEST_MAX_BYTES:-1048576}"
      CONTACTD_VCARD_MAX_BYTES: "${CONTACTD_VCARD_MAX_BYTES:-1048576}"
      CONTACTD_CHANGE_RETENTION_DAYS: "${CONTACTD_CHANGE_RETENTION_DAYS:-180}"
      CONTACTD_CHANGE_RETENTION_MAX_REVISIONS: "${CONTACTD_CHANGE_RETENTION_MAX_REVISIONS:-0}"
      CONTACTD_ENABLE_ADDRESSBOOK_COLOR: "${CONTACTD_ENABLE_ADDRESSBOOK_COLOR:-false}"
      CONTACTD_USERS: "${CONTACTD_USERS:-}"
      CONTACTD_DEFAULT_BOOK_SLUG: "${CONTACTD_DEFAULT_BOOK_SLUG:-contacts}"
      CONTACTD_DEFAULT_BOOK_NAME: "${CONTACTD_DEFAULT_BOOK_NAME:-Contacts}"
    volumes:
      - contactd-data:/data

volumes:
  contactd-data: {}
